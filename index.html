<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NEXUS - Premium Clothing Brand. Shop the latest collections of high-quality apparel.">
    <title>NEXUS | Premium Clothing</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">NEXUS</a>
            <nav class="nav-links">
                <a href="#home">Home</a>
                <a href="#shop">Shop</a>
                <a href="#about">About</a>
                <a href="admin.html" class="admin-link">Admin</a>
            </nav>
            <div class="cart-icon" id="cart-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Discover Your True Style</h1>
            <p class="hero-subtitle">Premium apparel designed for the modern individual.</p>
            <a href="#shop" class="btn btn-primary">Shop Collection</a>
        </div>
    </section>

    <!-- Shop Section -->
    <section id="shop" class="shop-section">
        <div class="container">
            <h2 class="section-title">New Arrivals</h2>
            <div class="product-grid" id="product-grid">
                <!-- Products dynamically loaded here via JS -->
            </div>
        </div>
    </section>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h2>Your Cart</h2>
                <button class="close-cart" id="close-cart">&times;</button>
            </div>
            <div class="cart-items" id="cart-items">
                <!-- Cart items load here -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-price">Rs. 0.00</span>
                </div>
                <button class="btn btn-primary btn-full checkout-btn" id="checkout-btn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="checkout-modal" id="checkout-modal">
        <div class="modal-content">
            <button class="close-modal" id="close-checkout">&times;</button>
            <h2>Checkout</h2>
            <form id="checkout-form" class="checkout-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="c-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="c-phone" required placeholder="07X XXX XXXX">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea id="c-address" required placeholder="Your address here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 NEXUS Official. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
